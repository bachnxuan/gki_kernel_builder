name: Kernel Builder
permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  linter:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Checkout code & init submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: 🪛 Run Ruff linter
        uses: astral-sh/ruff-action@v3.4.0
        with:
          args: "check --fix"
          src: "./src"
